version: "2"
run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - ineffassign
    - gosec
    - testifylint
    - bodyclose
    - noctx
    - sqlclosecheck
    - gocritic
    - gocyclo
    - misspell
    - unconvert
    - unparam

  settings:
    gosec:
      severity: low
      confidence: low
    gocyclo:
      min-complexity: 15

  exclusions:
    paths:
      - .*\.pb\.go
      - internal/mock/
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - bodyclose
      - path: _test\.go
        text: "SA5008"
      - path: (infra|internal)/.*_test\.go
        linters:
          - testifylint

formatters:
  enable:
    - gofumpt
    - goimports
