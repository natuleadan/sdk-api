services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 3s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream"]
    ports:
      - "14222:4222"
