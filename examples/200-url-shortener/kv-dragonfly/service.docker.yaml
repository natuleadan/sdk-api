name: kv-dragonfly-v2
port: 23204

kv:
  - name: kv-main
    driver: redis
    url: "${DRAGONFLY_ADDR}"

entry:
  - type: rest
    method: POST
    path: /links
    handler: createLink
  - type: rest
    method: GET
    path: /links
    handler: listLinks
  - type: rest
    method: GET
    path: /links/:id
    handler: getLink
  - type: rest
    method: PATCH
    path: /links/:id
    handler: updateLink
  - type: rest
    method: DELETE
    path: /links/:id
    handler: deleteLink
  - type: rest
    method: GET
    path: /expand/:shortCode
    handler: expandLink

server:
  host: "0.0.0.0"
  api_prefix: /api
  max_conns: 10000
  timeout: 30s
  middleware:
    - path: "/api/*"
      apply: []
