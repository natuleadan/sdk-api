name: url-shortener-maria-bench
services:
  mariadb:
    image: mariadb:11
    command: --max_connections=2000 --innodb_flush_log_at_trx_commit=2 --innodb_buffer_pool_size=256M
    environment:
      MYSQL_ROOT_PASSWORD: devpass
      MYSQL_DATABASE: shorturl
      MYSQL_USER: dev
      MYSQL_PASSWORD: devpass
    ports:
      - "24207:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 3s
      timeout: 10s
      retries: 30

  proxysql:
    image: proxysql/proxysql:latest
    volumes:
      - ./proxysql.cnf:/etc/proxysql.cnf:ro
    ports:
      - "24307:6033"
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: mysql -h127.0.0.1 -P6033 -udev -pdevpass -e 'SELECT 1' >/dev/null 2>&1
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  bench:
    build:
      context: ../../../..
      dockerfile: sdk-api/examples/200-url-shortener/mariadb/Dockerfile
    ports:
      - "23207:23207"
    depends_on:
      proxysql:
        condition: service_healthy
    environment:
      DOCKER_TEST: "1"
      DATABASE_URL: "dev:devpass@tcp(proxysql:6033)/shorturl?charset=utf8mb4&parseTime=true"
