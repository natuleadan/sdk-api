name: url-shortener
port: 23206

databases:
  - name: mongo-main
    driver: mongo
    url: "${MONGO_URI}"
    database: shorturl

entry:
  - type: crud
    model: Link
    db: mongo-main
    table: links
    path: /links

  - type: crud
    model: LinkExpand
    db: mongo-main
    table: links
    path: /expand
    overrides:
      list: "-"
      create: "-"
      update: "-"
      delete: "-"

server:
  host: "0.0.0.0"
  prefork: false
  api_prefix: /api/v1
  max_conns: 10000
  timeout: 30s
