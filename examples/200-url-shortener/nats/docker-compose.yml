name: url-shortener-nats-bench
services:
  pgdog:
    image: ghcr.io/pgdogdev/pgdog:main
    volumes:
      - ./pgdog.toml:/pgdog/pgdog.toml:ro
      - ./users.toml:/pgdog/users.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: psql -h127.0.0.1 -p6432 -Udev -dpostgres -c 'SELECT 1' >/dev/null 2>&1
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  postgres:
    image: postgres:18-alpine
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: postgres
    ports:
      - "24202:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 2s
      timeout: 2s
      retries: 10

  nats:
    image: nats:latest
    command: ["-js"]
    ports:
      - "25202:4222"
    healthcheck:
      test: ["CMD-SHELL", "wget -nv --spider http://localhost:8222/varz 2>/dev/null || exit 0"]
      interval: 3s
      timeout: 2s
      retries: 10

  bench:
    build:
      context: ../../../..
      dockerfile: sdk-api/examples/200-url-shortener/nats/Dockerfile
    ports:
      - "23202:23202"
    depends_on:
      postgres:
        condition: service_healthy
      pgdog:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      DOCKER_TEST: "1"
      CONFIG_PATH: /app/service.docker.yaml
      DATABASE_URL: postgres://dev:devpass@pgdog:6432/postgres?sslmode=disable
      NATS_URL: nats://nats:4222
