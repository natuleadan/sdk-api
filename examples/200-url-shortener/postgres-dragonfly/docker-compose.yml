name: url-shortener-pg-dfly-bench
services:
  pgdog:
    image: ghcr.io/pgdogdev/pgdog:main
    volumes:
      - ./pgdog.toml:/pgdog/pgdog.toml:ro
      - ./users.toml:/pgdog/users.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: psql -h127.0.0.1 -p6432 -Udev -dpostgres -c 'SELECT 1' >/dev/null 2>&1
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  postgres:
    image: postgres:18-alpine
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: postgres
    ports:
      - "24204:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 2s
      timeout: 2s
      retries: 10

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: ["--cluster_mode=emulated"]
    healthcheck:
      test: redis-cli -h 127.0.0.1 -p 6379 PING >/dev/null 2>&1
      interval: 2s
      timeout: 3s
      retries: 15

  bench:
    build:
      context: ../../../..
      dockerfile: sdk-api/examples/200-url-shortener/postgres-dragonfly/Dockerfile
    ports:
      - "23204:23204"
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      pgdog:
        condition: service_healthy
    environment:
      DOCKER_TEST: "1"
      DRAGONFLY_ADDR: dragonfly:6379
      DATABASE_URL: postgres://dev:devpass@pgdog:6432/postgres?sslmode=disable
