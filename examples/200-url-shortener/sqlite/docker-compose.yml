name: url-shortener-turso-bench
services:
  bench:
    build:
      context: ../../../..
      dockerfile: sdk-api/examples/200-url-shortener/sqlite/Dockerfile
    ports:
      - "23208:23208"
    environment:
      DOCKER_TEST: "1"
      RPS_BENCH: "${RPS_BENCH}"
      DATABASE_URL: "/app/data/shorturl.db?_busy_timeout=30000"
