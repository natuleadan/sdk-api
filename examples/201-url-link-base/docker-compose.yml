name: url-link-base-bench
services:
  pgdog:
    image: ghcr.io/pgdogdev/pgdog:main
    volumes:
      - ./pgdog.toml:/pgdog/pgdog.toml:ro
      - ./users.toml:/pgdog/users.toml:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: postgres
    ports:
      - "15431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine

  bench:
    build:
      context: ../../..
      dockerfile: sdk-api/examples/201-url-link-base/Dockerfile
    ports:
      - "18083:18083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      pgdog:
        condition: service_started
    environment:
      DOCKER_TEST: "1"
      REDIS_ADDR: redis:6379
      DATABASE_URL: postgres://dev:devpass@pgdog:6432/postgres?sslmode=disable
