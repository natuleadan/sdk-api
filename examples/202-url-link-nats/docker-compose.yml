name: url-link-nats-bench
services:
  pgdog:
    image: ghcr.io/pgdogdev/pgdog:main
    volumes:
      - ./pgdog.toml:/pgdog/pgdog.toml:ro
      - ./users.toml:/pgdog/users.toml:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: postgres
    ports:
      - "15430:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 2s
      timeout: 2s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream"]
    ports:
      - "14222:4222"

  bench:
    build:
      context: ../../..
      dockerfile: sdk-api/examples/202-url-link-nats/Dockerfile
    ports:
      - "18084:18084"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      pgdog:
        condition: service_started
    environment:
      DOCKER_TEST: "1"
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgres://dev:devpass@pgdog:6432/postgres?sslmode=disable
