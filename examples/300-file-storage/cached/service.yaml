name: file-cached
port: 23302

server:
  host: "0.0.0.0"
  prefork: false
  api_prefix: /api/v1

entry:
  - type: file
    method: POST
    path: /files/upload/:key
    handler: onUpload
    storage:
      mode: s3
      endpoint: "${S3_ENDPOINT}"
      bucket: "${S3_BUCKET}"
      region: us-east-1
      access_key: "${S3_ACCESS_KEY}"
      secret_key: "${S3_SECRET_KEY}"
      pool:
        max_idle_conns: 200
        max_idle_conns_per_host: 100
        max_conns_per_host: 250
      cache:
        l1: ram
        l1_ttl: 5m
        l1_size: 10000
        l2: disk
        l2_path: /data/cache

  - type: rest
    method: GET
    path: /files/download/:key
    handler: onDownloadCached
