name: 300-file-storage-pg-nats
services:
  postgres:
    image: postgres:18-alpine
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 3s
      timeout: 3s
      retries: 10

  pgdog:
    image: ghcr.io/pgdogdev/pgdog:main
    volumes:
      - ./pgdog.toml:/pgdog/pgdog.toml:ro
      - ./users.toml:/pgdog/users.toml:ro
    depends_on:
      postgres:
        condition: service_healthy

  nats:
    image: nats:latest
    command: ["-js"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - minio-data:/data

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      mc mb myminio/dummy-bucket --ignore-existing &&
      echo 'Bucket ready'
      "

  app:
    build:
      context: ../../../..
      dockerfile: sdk-api/examples/300-file-storage/pg-nats/Dockerfile
    ports:
      - "18088:18088"
    depends_on:
      postgres:
        condition: service_healthy
      pgdog:
        condition: service_started
      nats:
        condition: service_started
      createbucket:
        condition: service_completed_successfully
    environment:
      DOCKER_TEST: "1"
      RPS_BENCH: "${RPS_BENCH}"
      DATABASE_URL: postgres://dev:devpass@pgdog:6432/postgres?sslmode=disable
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: dummy-bucket
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      PORT: "18088"

volumes:
  minio-data:
