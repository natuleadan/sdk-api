name: file-proxy
port: 10122

server:
  host: "0.0.0.0"
  prefork: false
  api_prefix: /api/v1

entry:
  - type: file
    method: POST
    path: /files/upload/:key
    handler: onUpload
    storage:
      mode: s3
      endpoint: "${S3_ENDPOINT}"
      bucket: "${S3_BUCKET}"
      region: us-east-1
      access_key: "${S3_ACCESS_KEY}"
      secret_key: "${S3_SECRET_KEY}"

  - type: rest
    method: GET
    path: /files/download/:key
    handler: onDownloadProxy
