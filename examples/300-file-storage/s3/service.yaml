name: file-s3
port: 23305

server:
  host: "0.0.0.0"
  prefork: false
  api_prefix: /api/v1

entry:
  - type: file
    method: POST
    path: /files/upload/:key
    handler: onUpload
    storage:
      mode: s3
      endpoint: "${S3_ENDPOINT}"
      bucket: "${S3_BUCKET}"
      region: us-east-1
      access_key: "${S3_ACCESS_KEY}"
      secret_key: "${S3_SECRET_KEY}"
      presign: true
      presign_ttl: 5m

  - type: rest
    method: GET
    path: /files/download/:key
    handler: onDownloadProxy

  - type: rest
    method: GET
    path: /files/presign/:key
    handler: onDownloadPresign

  - type: rest
    method: GET
    path: /files/sign/:key
    handler: onSignOnly
