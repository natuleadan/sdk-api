name: auth-roles
port: 23400

server:
  host: "0.0.0.0"
  prefork: true
  timeout: 30s
  body_limit: 4194304
  max_conns: 10000
  health_path: /healthz
  api_prefix: /api
  shutdown_timeout: 10s
  middleware:
    - path: "/*"
      apply: [logger]
  security:
    encrypt_cookie:
      enabled: true
      key: "${ENCRYPT_COOKIE_KEY}"
      except:
        - "csrf_token"
        - "token"
  csrf:
    enabled: true
    json_check: true
    exclude_paths:
      - "/api/login"
      - "/api/signup"
      - "/api/no-csrf"
      - "/api/oauth/token"
      - "/api/oauth/introspect"
      - "/api/oauth/revoke"
      - "/api/auth/magic-link"
      - "/api/auth/magic-link/verify"
      - "/api/oauth/authorize"
      - "/api/oauth/clients"
      - "/api/oauth/clients/*"
  security_headers:
    frame_options: DENY
    referrer_policy: no-referrer
    permissions_policy: "camera=(), microphone=()"
    hsts: false
    csp_config:
      level: basic
      default_src: ["'self'"]
      script_src: ["'self'"]
      style_src: ["'self'"]
      img_src: ["'self'", "data:"]
  cors:
    origins: ["*"]
    methods: ["GET", "POST", "PATCH", "DELETE", "OPTIONS"]
    headers: ["Content-Type", "Authorization", "X-CSRF-Token", "X-Debug"]
    credentials: true
    max_age: 3600
  rate_limit:
    enabled: true
    kv: cache-main
    algorithm: token_bucket
    ttl: 5m

kv:
  - name: cache-main
    driver: redis
    url: "${REDIS_URL}"

databases:
  - name: primary
    driver: postgres
    url: "${DATABASE_URL}"
    pool:
      max_conns: 50
      min_conns: 2
      reserved_conns: 5

auth:
  enabled: true
  driver: manual
  secret: "${JWT_SECRET}"
  algorithm: HS256
  expiry: 900
  cookie:
    access_token_name: token
    http_only: true
    secure: false
    same_site: Lax
  refresh:
    enabled: true

entry:
  - type: rest
    method: POST
    path: /login
    handler: loginHandler

  - type: rest
    method: POST
    path: /signup
    handler: signupHandler
    rate_limit_per_user:
      requests_per_second: 2
      burst: 4

  - type: rest
    method: POST
    path: /auth/forgot-password
    handler: forgotPasswordHandler

  - type: rest
    method: POST
    path: /auth/reset-password
    handler: resetPasswordHandler

  - type: rest
    method: GET
    path: /auth/verify-email
    handler: verifyEmailHandler

  - type: rest
    method: POST
    path: /auth/mfa/enable
    handler: mfaEnableHandler
    auth_modes: [jwt]

  - type: rest
    method: POST
    path: /auth/mfa/verify
    handler: mfaVerifyHandler
    auth_modes: [jwt]

  - type: rest
    method: GET
    path: /mfa-protected
    handler: mfaProtectedHandler
    auth_modes: [jwt]
    requires_mfa: true

  - type: rest
    method: POST
    path: /auth/change-password
    handler: changePasswordHandler
    auth_modes: [jwt]

  - type: rest
    method: POST
    path: /auth/revoke
    handler: revokeTokenHandler
    auth_modes: [jwt]

  - type: rest
    method: GET
    path: /blacklist-protected
    handler: blacklistProtectedHandler
    auth_modes: [jwt]

  - type: rest
    method: POST
    path: /no-csrf
    handler: noCSRFHandler
    csrf: false

  - type: rest
    method: GET
    path: /profile
    handler: profileHandler
    auth_modes: [jwt]

  - type: rest
    method: GET
    path: /cookie/profile
    handler: profileHandler
    auth_modes: [jwt]
    jwt_from: "cookie:token"

  - type: rest
    method: GET
    path: /products
    handler: listProducts
    auth_modes: [jwt, apikey]
    api_key_prefix: "sk-"

  - type: rest
    method: POST
    path: /products
    handler: createProduct
    auth_modes: [jwt, apikey]
    api_key_prefix: "sk-"

  - type: rest
    method: GET
    path: /products/:id
    handler: getProduct
    auth_modes: [jwt, apikey]
    api_key_prefix: "sk-"

  - type: rest
    method: PATCH
    path: /products/:id
    handler: updateProduct
    auth_modes: [jwt, apikey]
    api_key_prefix: "sk-"

  - type: rest
    method: DELETE
    path: /products/:id
    handler: deleteProduct
    auth_modes: [jwt, apikey]
    api_key_prefix: "sk-"

  - type: rest
    method: DELETE
    path: /admin/products/:id/hard
    handler: hardDeleteProduct
    auth_modes: [jwt]
    roles: ["admin"]

  - type: rest
    method: PATCH
    path: /admin/products/:id/visibility
    handler: setVisibility
    auth_modes: [jwt]
    roles: ["admin"]

  - type: rest
    method: GET
    path: /admin/products/:id/audit
    handler: getAuditLog
    auth_modes: [jwt]
    roles: ["admin"]

  - type: rest
    method: GET
    path: /admin/users
    handler: listUsers
    auth_modes: [jwt]
    roles: ["admin"]
    permissions: ["users:manage"]

  - type: rest
    method: DELETE
    path: /admin/users/:id
    handler: deleteUser
    auth_modes: [jwt]
    roles: ["admin"]
    permissions: ["users:manage"]

  - type: rest
    method: PATCH
    path: /admin/users/:id/role
    handler: setUserRole
    auth_modes: [jwt]
    roles: ["admin"]
    permissions: ["users:manage"]

  - type: rest
    method: POST
    path: /rate-limited
    handler: rateLimitedHandler
    auth_modes: [jwt, apikey]
    api_key_prefix: "sk-"
    rate_limit:
      requests_per_second: 10
      burst: 20
    rate_limit_per_user:
      requests_per_second: 5
      burst: 10
    rate_limit_per_key:
      requests_per_second: 10
      burst: 20

  - type: rest
    method: POST
    path: /per-user-limited
    handler: perUserLimited
    auth_modes: [jwt]
    rate_limit_per_user:
      requests_per_second: 2
      burst: 4

  - type: rest
    method: POST
    path: /per-role-limited
    handler: perRoleLimited
    auth_modes: [jwt]
    roles: ["admin", "editor", "viewer"]
    rate_limit_per_role:
      admin:
        requests_per_second: 5
        burst: 10
      editor:
        requests_per_second: 3
        burst: 6
      viewer:
        requests_per_second: 1
        burst: 2

  - type: rest
    method: POST
    path: /per-key-limited
    handler: perKeyLimited
    auth_modes: [apikey]
    api_key_prefix: "sk-"
    rate_limit_per_key:
      requests_per_second: 3
      burst: 6

  - type: rest
    method: GET
    path: /viewer-data
    handler: viewerDataHandler
    auth_modes: [jwt]
    roles: ["viewer"]

  - type: rest
    method: GET
    path: /admin/dual-products
    handler: listProducts
    auth_modes: [jwt, apikey]
    api_key_prefix: "sk-"
    roles: ["admin"]

  - type: rest
    method: POST
    path: /max-func-limited
    handler: maxFuncLimited
    auth_modes: [jwt]
    rate_limit_per_user:
      requests_per_second: 1
      burst: 2

  - type: rest
    method: POST
    path: /auth/magic-link
    handler: magicLink

  - type: rest
    method: GET
    path: /auth/magic-link/verify
    handler: magicLinkVerify

  - type: rest
    method: POST
    path: /auth/access-code
    handler: accessCode

  - type: rest
    method: POST
    path: /auth/access-code/verify
    handler: accessCodeVerify

  - type: rest
    method: POST
    path: /auth/sms/send
    handler: smsSend

  - type: rest
    method: POST
    path: /auth/sms/verify
    handler: smsVerify

  - type: rest
    method: GET
    path: /auth/:provider/login
    handler: socialLogin

  - type: rest
    method: GET
    path: /auth/:provider/callback
    handler: socialCallback

  - type: rest
    method: GET
    path: /auth/linked-accounts
    handler: linkedAccounts
    auth_modes: [jwt]

  - type: rest
    method: POST
    path: /auth/link
    handler: linkAccount
    auth_modes: [jwt]

  - type: rest
    method: DELETE
    path: /auth/linked-accounts/:id
    handler: unlinkAccount
    auth_modes: [jwt]

  - type: rest
    method: POST
    path: /auth/webauthn/register/begin
    handler: webAuthnRegisterBegin
    auth_modes: [jwt]

  - type: rest
    method: POST
    path: /auth/webauthn/register/finish
    handler: webAuthnRegisterFinish
    auth_modes: [jwt]

  - type: rest
    method: POST
    path: /auth/webauthn/login/begin
    handler: webAuthnLoginBegin

  - type: rest
    method: POST
    path: /auth/webauthn/login/finish
    handler: webAuthnLoginFinish

  - type: rest
    method: POST
    path: /auth/webauthn/login/manual/begin
    handler: webAuthnManualLoginBegin

  - type: rest
    method: POST
    path: /auth/webauthn/login/manual/finish
    handler: webAuthnManualLoginFinish

  - type: rest
    method: GET
    path: /auth/webauthn/credentials
    handler: webAuthnCredentials
    auth_modes: [jwt]

  - type: rest
    method: DELETE
    path: /auth/webauthn/credentials/:id
    handler: webAuthnDeleteCredential
    auth_modes: [jwt]

  - type: rest
    method: GET
    path: /.well-known/openid-configuration
    handler: oidcDiscovery

  - type: rest
    method: GET
    path: /.well-known/jwks.json
    handler: oidcJWKS

  - type: rest
    method: GET
    path: /userinfo
    handler: oidcUserInfo
    csrf: false

  - type: rest
    method: GET
    path: /oauth/authorize
    handler: oauthAuthorize
    auth_modes: [jwt]

  - type: rest
    method: POST
    path: /oauth/token
    handler: oauthToken
    csrf: false

  - type: rest
    method: POST
    path: /oauth/introspect
    handler: oauthIntrospect
    csrf: false

  - type: rest
    method: POST
    path: /oauth/revoke
    handler: oauthRevoke
    csrf: false

  - type: rest
    method: GET
    path: /oauth/clients
    handler: oauthClientsList
    auth_modes: [jwt]

  - type: rest
    method: POST
    path: /oauth/clients
    handler: oauthClientsCreate
    auth_modes: [jwt]

  - type: rest
    method: DELETE
    path: /oauth/clients/:id
    handler: oauthClientsDelete
    auth_modes: [jwt]

  - type: crud
    model: TenantProduct
    resource: tenant-products
    auth_modes: [jwt]
    db: primary
    tenant_scope: org_id
    tenant_field: tenant_id
