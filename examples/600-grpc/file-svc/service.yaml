name: file-svc
port: 23603

server:
  host: "0.0.0.0"
  mode: micro
  api_prefix: /api/v1
  grpc_clients:
    - name: auth-svc
      target: direct:///auth-svc:50051

databases:
  - name: primary
    driver: postgres
    url: "${DATABASE_URL_SHARED}"

auth:
  enabled: true
  driver: manual
  secret: "${JWT_SECRET}"
  algorithm: HS256
  expiry: 3600

entry:
  - type: file
    method: POST
    path: /files/upload
    handler: uploadFile
    auth_modes: [jwt]
    storage:
      mode: s3
      endpoint: "${S3_ENDPOINT}"
      bucket: "${S3_BUCKET}"
      region: us-east-1
      access_key: "${S3_ACCESS_KEY}"
      secret_key: "${S3_SECRET_KEY}"
      presign: true
      presign_ttl: 5m
  - type: rest
    method: GET
    path: /files/:key/download
    handler: downloadFile
    storage:
      mode: s3
      endpoint: "${S3_ENDPOINT}"
      bucket: "${S3_BUCKET}"
      region: us-east-1
      access_key: "${S3_ACCESS_KEY}"
      secret_key: "${S3_SECRET_KEY}"
      presign: true
      presign_ttl: 5m
