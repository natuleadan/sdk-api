syntax = "proto3";
package authsvc;
option go_package = "600-grpc/pb/authpb";

message User {
  string id = 1;
  string username = 2;
  string role = 3;
  int32 credits = 4;
}

message VerifyTokenRequest {
  string token = 1;
}
message VerifyTokenResponse {
  bool valid = 1;
  User user = 2;
  string error = 3;
}

message DeductCreditRequest {
  string user_id = 1;
  int32 amount = 2;
}
message DeductCreditResponse {
  bool ok = 1;
  int32 balance = 2;
}

service AuthService {
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
  rpc DeductCredit(DeductCreditRequest) returns (DeductCreditResponse);
}
