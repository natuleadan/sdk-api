syntax = "proto3";
package ticketsvc;
option go_package = "600-grpc/pb/ticketpb";

message Ticket {
  int64 id = 1;
  string name = 2;
  double price = 3;
  int32 stock = 4;
}

message Order {
  int64 id = 1;
  int64 ticket_id = 2;
  int32 quantity = 3;
  string status = 4;
  string user_id = 5;
}

message BuyTicketRequest {
  int64 ticket_id = 1;
  int32 quantity = 2;
  string user_id = 3;
  string token = 4;
}
message BuyTicketResponse {
  Order order = 1;
  bool ok = 2;
  string error = 3;
}

service TicketService {
  rpc BuyTicket(BuyTicketRequest) returns (BuyTicketResponse);
}
