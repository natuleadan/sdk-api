name: receipt-svc
port: 23608
server:
  host: "0.0.0.0"
  api_prefix: /api/v1
databases:
  - name: primary
    driver: postgres
    url: "${DATABASE_URL_SHARED}"
auth:
  enabled: true
  driver: manual
  secret: "${JWT_SECRET}"
  algorithm: HS256
  expiry: 3600
entry:
  - type: rest
    method: POST
    path: /receipts
    handler: generateReceipt
    auth_modes: [jwt]
