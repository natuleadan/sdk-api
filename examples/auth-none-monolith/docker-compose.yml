name: auth-none-monolith-bench
services:
  pgdog:
    image: ghcr.io/pgdogdev/pgdog:main
    volumes:
      - ./pgdog.toml:/pgdog/pgdog.toml:ro
      - ./users.toml:/pgdog/users.toml:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"
    volumes:
      - none_mono_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  bench:
    build:
      context: ../../..
      dockerfile: sdk-api/examples/auth-none-monolith/Dockerfile
    ports:
      - "13000:13000"
    depends_on:
      postgres:
        condition: service_healthy
      pgdog:
        condition: service_started
    environment:
      DOCKER_TEST: "1"
      DATABASE_URL: "postgres://postgres:postgres@pgdog:6432/postgres?sslmode=disable"

volumes:
  none_mono_pg_data:
