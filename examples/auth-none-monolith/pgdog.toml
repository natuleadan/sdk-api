# PgDog connection pooler configuration
# https://pgdog.dev/docs/configuration
#
# PgDog sits between the application and PostgreSQL.
# It accepts many client connections and maintains a small pool of persistent PG connections.
#
# Quick start:
#   1. Place this file and users.toml in the example directory
#   2. Add PgDog service to docker-compose.yml (see examples/auth-none-monolith/)
#   3. Point DATABASE_URL to pgdog:6432
#   4. docker compose up

[general]
host = "0.0.0.0"           # Listen on all interfaces inside Docker
port = 6432                 # Default PgDog port (not the standard 5432)
workers = 4                 # Worker threads for handling connections
default_pool_size = 100     # Max server connections per pool (to PG)
min_pool_size = 10          # Min idle connections per pool (kept warm)
connect_timeout = 10_000    # Connection timeout in ms (10s)
pooler_mode = "transaction" # Transaction mode — connections returned to pool after each TX
prepared_statements = "extended" # Extended query protocol for prepared stmts
query_parser = "on"         # Parse queries for load balancing
auth_type = "trust"         # Trust mode — auth delegated to users.toml
log_format = "text"
log_level = "info"

[admin]
name = "admin"              # Admin user for SHOW POOLS, RELOAD, etc.
password = "admin"
user = "admin"

[[databases]]
name = "postgres"           # Database name (must match users.toml and connection string)
role = "primary"            # Read-write role. Replicas can be added for read splitting
host = "postgres"           # Docker service name of PostgreSQL container
port = 5432                 # Internal PostgreSQL port
