name: exit-workers
services:
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream"]

  app:
    build:
      context: ../../..
      dockerfile: sdk-api/examples/exit-workers/Dockerfile
    depends_on:
      nats:
        condition: service_started
    environment:
      NATS_URL: nats://nats:4222
    ports:
      - "18091:18091"
