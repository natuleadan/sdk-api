name: exit-workers
port: 18091

nats:
  - name: primary
    url: "${NATS_URL}"
    streams:
      - name: orders
      - name: email
      - name: cron

entry:
  - type: rest
    method: GET
    path: /health
    handler: healthCheck

  - type: webhook
    path: /webhooks/order
    handler: onInboundOrder
    nats_publish:
      - stream: orders
        subject: orders.created

exit:
  - name: email-sender
    subscribe:
      stream: orders
      subject: orders.confirmed
    handler: onSendEmail
    max_concurrent: 5
    reply: false

  - name: order-validator
    subscribe:
      stream: orders
      subject: orders.validate
    handler: onValidate
    max_concurrent: 10
    reply: true
    reply_timeout: "30s"

cron:
  - name: daily-report
    schedule: "0 6 * * *"
    mode: handler
    handler: onDailyReport

  - name: hourly-cleanup
    schedule: "0 * * * *"
    mode: nats
    publish:
      stream: cron
      subject: cron.cleanup

server:
  host: "0.0.0.0"
  api_prefix: ""
  max_conns: 1000
  middleware:
    - path: "/*"
      apply:
        - logger
