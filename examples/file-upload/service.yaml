name: file-upload
port: 18090

entry:
  - type: file
    method: POST
    path: /files/upload
    handler: onUpload
    allowed_types:
      - image/png
      - image/jpeg
      - application/pdf
      - text/plain
    max_size: 10MB
    storage:
      mode: local
      path: /data/uploads

  - type: file
    method: GET
    path: /files/:id/download
    handler: onDownload
    storage:
      mode: local
      path: /data/uploads

  - type: rest
    method: GET
    path: /files/:id/info
    handler: onFileInfo

server:
  host: "0.0.0.0"
  api_prefix: ""
  max_conns: 1000
  middleware:
    - path: "/*"
      apply:
        - logger
