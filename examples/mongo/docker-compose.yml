name: mongo-bench
services:
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: bench

  bench:
    build:
      context: ../../..
      dockerfile: sdk-api/examples/mongo/Dockerfile
    depends_on:
      mongo:
        condition: service_started
    environment:
      MONGO_URI: mongodb://mongo:27017
