name: url-link-nats
port: 8080

databases:
  - name: pg-main
    driver: postgres
    url: "${DATABASE_URL}"
    pool:
      max_conns: 20
      min_conns: 5

nats:
  - name: primary
    url: "${NATS_URL}"

entry:
  - type: crud
    model: Link
    db: pg-main
    table: link
    path: /links

  - type: rest
    method: GET
    path: /expand/:shortCode
    handler: expandLink

server:
  host: "0.0.0.0"
  api_prefix: /api/v1
  prefork: false
  max_conns: 10000
  timeout: 30s
  middleware:
    - path: "/api/v1/*"
      apply:
        - logger
        - breaker
